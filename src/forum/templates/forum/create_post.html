{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">
                        {% if publicacion %}
                            <i class="bi bi-pencil-square me-2"></i>Editar Publicación
                        {% else %}
                            Crear Nueva Publicación
                        {% endif %}
                    </h4>
                </div>
                <div class="card-body">
                    
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        {{ form.as_p }}
                        
                        <div class="mt-4">
                            <button type="submit" class="btn {% if publicacion %}btn-warning{% else %}btn-success{% endif %} fw-bold">
                                {% if publicacion %}
                                    Guardar Cambios
                                {% else %}
                                    Publicar en el Foro
                                {% endif %}
                            </button>
                            <a href="{% url 'forum:board' %}" class="btn btn-secondary">Cancelar</a>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
