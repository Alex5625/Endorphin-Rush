{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">Crear Nueva Publicación</h4>
                </div>
                <div class="card-body">
                    
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        {{ form.as_p }}
                        
                        <div class="mt-4">
                            <button type="submit" class="btn btn-success">Publicar en el Muro</button>
                            <a href="{% url 'forum:board' %}" class="btn btn-secondary">Cancelar</a>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
